user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # Main server block (HTTP)
    server {
        listen 80;
        server_name ssvnauka.com www.ssvnauka.com localhost _;
        
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Cache static files
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Main pages
        location = / {
            try_files /index.html =404;
        }

        location /about {
            try_files /about/index.html /index.html =404;
        }

        location /appointment {
            try_files /appointment/index.html /index.html =404;
        }

        location /articles {
            try_files /articles/index.html /index.html =404;
        }

        location /checkup {
            try_files /checkup/index.html /index.html =404;
        }

        location /expert {
            try_files /expert/index.html /index.html =404;
        }

        location /gynecology {
            try_files /gynecology/index.html /index.html =404;
        }

        location /myomectomy {
            try_files /myomectomy/index.html /index.html =404;
        }

        location /onco-diagnostics {
            try_files /onco-diagnostics/index.html /index.html =404;
        }

        location /oncosurgery {
            try_files /oncosurgery/index.html /index.html =404;
        }

        location /reviews {
            try_files /reviews/index.html /index.html =404;
        }

        location /surgery {
            try_files /surgery/index.html /index.html =404;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Rate limit all other requests
        location / {
            limit_req zone=general burst=20 nodelay;
            try_files $uri $uri/ /index.html =404;
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
