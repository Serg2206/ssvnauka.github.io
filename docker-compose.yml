version: '3.8'

services:
  # ============================================================================
  # ssvnauka.com website (Nginx)
  # ============================================================================
  website:
    image: nginx:alpine
    container_name: ssvnauka-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssvnauka_deploy:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - ssvnauka-net

  # ============================================================================
  # Portainer — Docker management UI
  # ============================================================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    restart: unless-stopped
    networks:
      - ssvnauka-net

  # ============================================================================
  # Watchtower — auto-update containers
  # ============================================================================
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400  # Check once per day
      - WATCHTOWER_INCLUDE_STOPPED=true
    restart: unless-stopped
    networks:
      - ssvnauka-net

  # ============================================================================
  # Uptime Kuma — monitoring
  # ============================================================================
  uptime:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime_data:/app/data
    restart: unless-stopped
    networks:
      - ssvnauka-net

  # ============================================================================
  # PostgreSQL (for future apps)
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ssvnauka-db
    environment:
      POSTGRES_USER: ${DB_USER:-sergiy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-ssvnauka}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - ssvnauka-net

  # ============================================================================
  # Redis (for caching)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ssvnauka-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ssvnauka-net

  # ============================================================================
  # Node Exporter (for Prometheus metrics)
  # ============================================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped
    networks:
      - ssvnauka-net

volumes:
  portainer_data:
  uptime_data:
  postgres_data:
  redis_data:

networks:
  ssvnauka-net:
    driver: bridge
