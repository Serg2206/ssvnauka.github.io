version: '3.8'

services:
  # ============================================================================
  # ssvnauka.com website (Nginx)
  # ============================================================================
  website:
    image: nginx:alpine
    container_name: ssvnauka-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssvnauka_deploy:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - ssvnauka-net

  # ============================================================================
  # PostgreSQL 16 — Main Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ssvnauka-db
    environment:
      POSTGRES_USER: ${DB_USER:-sergiy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-ssvnauka}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - ssvnauka-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sergiy} -d ${DB_NAME:-ssvnauka}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # pgAdmin 4 — Database Management UI
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ssvnauka-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-ssvnauka@gmail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    restart: unless-stopped
    networks:
      - ssvnauka-net
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================================
  # Portainer — Docker Management UI
  # ============================================================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    restart: unless-stopped
    networks:
      - ssvnauka-net

  # ============================================================================
  # Redis — Caching & Sessions
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ssvnauka-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ssvnauka-net

  # ============================================================================
  # Uptime Kuma — Monitoring
  # ============================================================================
  uptime:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime_data:/app/data
    restart: unless-stopped
    networks:
      - ssvnauka-net

volumes:
  postgres_data:
  pgadmin_data:
  portainer_data:
  uptime_data:
  redis_data:

networks:
  ssvnauka-net:
    driver: bridge
